# Torre de Controle - reverse proxy publico
# Dominio: visitante.rodriguescolchoes.com.br
#
# Backend interno do Torre:
# - HTTP: 10.101.10.13:3344
# - API fica no mesmo host/path (/api) e sera encaminhada automaticamente

<VirtualHost *:80>
    ServerName visitante.rodriguescolchoes.com.br
    RewriteEngine On
    RewriteRule ^/(.*)$ https://visitante.rodriguescolchoes.com.br/$1 [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName visitante.rodriguescolchoes.com.br

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/visitante.rodriguescolchoes.com.br/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/visitante.rodriguescolchoes.com.br/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    ProxyRequests Off
    SSLProxyEngine On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s

    ProxyPass / http://10.101.10.13:3344/ timeout=120
    ProxyPassReverse / http://10.101.10.13:3344/

    ErrorLog ${APACHE_LOG_DIR}/visitante_torre_error.log
    CustomLog ${APACHE_LOG_DIR}/visitante_torre_access.log combined
</VirtualHost>
</IfModule>
